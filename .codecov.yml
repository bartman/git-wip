codecov:
  branch: master
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "build/_deps/**/*"
  - "test/**/*"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no