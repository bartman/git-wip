codecov:
  branch: master
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

ignore:
  - "build/_deps/**/*"
  - "test/**/*"

# Strip the GitHub Actions container-mount prefix (/__w/<owner>/<repo>/)
# from paths emitted by gcovr --root "$GITHUB_WORKSPACE".
# Without this, Codecov cannot match coverage lines to repo files.
fixes:
  - "/__w/git-wip/git-wip/::"

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: no